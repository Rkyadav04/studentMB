{% extends 'student/base.html' %}
{% block content %}
<h2>{{ student|default_if_none:"Add" }} Student</h2>

<form method="post" class="row g-3">
    {% csrf_token %}
    <div class="col-md-6">
        <label class="form-label">Student ID</label>
        <input type="text" name="student_id" class="form-control" value="{{ student.student_id|default:'' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" value="{{ student.name|default:'' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Course</label>
        <input type="text" name="course" class="form-control" value="{{ student.course|default:'' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Contact</label>
        <input type="text" name="contact" class="form-control" value="{{ student.contact|default:'' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="text" name="email" class="form-control" value="{{ student.email|default:'' }}">
    </div>
    <div class="col-md-12">
        <label class="form-label">Last Result</label>
        <input type="text" name="last_result" class="form-control" value="{{ student.last_result|default:'' }}">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-success">Update Student</button>
        <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
