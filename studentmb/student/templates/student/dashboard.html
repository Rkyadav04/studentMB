{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">


  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Student Dashboard</a>
    </div>
  </nav>
  
  <div class="container mb-4">
    <div class="row g-4">

      <div class="col-md-4">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Total Students</h5>
            <h2 class="text-primary">{{ total_students }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Active Students</h5>
            <h2 class="text-success">{{ active_students }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Inactive Students</h5>
            <h2 class="text-danger">{{ inactive_students }}</h2>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="container">
    <div class="row g-4">

      <!-- Students per Course -->
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white">Students per Course</div>
          <div class="card-body">
            <canvas id="courseChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Students per Status -->
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white">Students per Status</div>
          <div class="card-body">
            <canvas id="statusChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Registrations over 6 months -->
      <div class="col-md-12">
        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white">Registrations (Last 6 Months)</div>
          <div class="card-body">
            <canvas id="monthChart"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Parse context variables safely into JS
    const courseLabels = JSON.parse('{{ course_labels|safe|escapejs }}');
    const courseCounts = JSON.parse('{{ course_counts|safe|escapejs }}');
    const statusLabels = JSON.parse('{{ status_labels|safe|escapejs }}');
    const statusCounts = JSON.parse('{{ status_counts|safe|escapejs }}');
    const monthLabels = JSON.parse('{{ month_labels|safe|escapejs }}');
    const monthCounts = JSON.parse('{{ month_counts|safe|escapejs }}');

    // Students per Course
    new Chart(document.getElementById("courseChart"), {
      type: "bar",
      data: {
        labels: courseLabels,
        datasets: [{
          label: "Students",
          data: courseCounts,
          backgroundColor: "rgba(54, 162, 235, 0.6)"
        }]
      }
    });

    // Students per Status
    new Chart(document.getElementById("statusChart"), {
      type: "doughnut",
      data: {
        labels: statusLabels,
        datasets: [{
          label: "Students",
          data: statusCounts,
          backgroundColor: ["#28a745", "#dc3545", "#ffc107"]
        }]
      }
    });

    // Registrations per Month
    new Chart(document.getElementById("monthChart"), {
      type: "line",
      data: {
        labels: monthLabels,
        datasets: [{
          label: "New Students",
          data: monthCounts,
          fill: false,
          borderColor: "rgba(75, 192, 192, 1)",
          tension: 0.1
        }]
      }
    });
  </script>

</body>

</html>
