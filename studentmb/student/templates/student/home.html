{% extends 'student/base.html' %}
{% block content %}
<h2 class="mb-4">All Students</h2>
<a href="{% url 'add_student' %}" class="btn btn-primary mb-3">Add Student</a>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Course</th>
            <th>Contact</th>
            <th>Result</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for s in student %}
        <tr>
            <td>{{ s.student_id }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.course }}</td>
            <td>{{ s.contact }}</td>
            <td>{{ s.last_result }}</td>
            <td>
                <a href="{% url 'edit_student' s.id %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'delete_student' s.id %}" class="btn btn-danger"
                    onclick="return confirm('Are you sure you want to delete this student?');">
                    Delete
                </a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="6" class="text-center">No students found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
